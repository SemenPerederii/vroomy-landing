<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vroomy - The Next Generation Car Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    
    <!-- Подключаем шрифт Unbounded из Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@900&display=swap" rel="stylesheet">
    
    <link rel="icon" type="image/x-icon" href="logo_green.svg">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { lime: { 400: '#a3e635' } },
                    fontFamily: {
                        unbounded: ['Unbounded', 'sans-serif'],
                    },
                    // Добавляем кастомную анимацию появления
                    animation: {
                        'appearance': 'appear 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        appear: {
                            '0%': { opacity: '0', transform: 'scale(0.96) translateY(10px)', filter: 'blur(4px)' },
                            '100%': { opacity: '1', transform: 'scale(1) translateY(0)', filter: 'blur(0)' },
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex flex-col justify-center items-center p-4 selection:bg-lime-400 selection:text-black">
    
    <!-- Добавлен класс animate-appearance для плавного входа карточки -->
    <div class="max-w-2xl w-full text-center space-y-8 p-10 border border-zinc-800/50 bg-zinc-900/30 rounded-3xl backdrop-blur-sm shadow-2xl relative overflow-hidden animate-appearance opacity-0">
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-lime-400/10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-lime-400/10 rounded-full blur-3xl"></div>

        <div class="relative z-10">
            <!-- Блок с логотипом и названием -->
            <div class="flex flex-col items-center mb-2">
                <img src="logo_green.svg" alt="Vroomy Logo" class="h-16 w-auto mb-4 object-contain select-none pointer-events-none" />
                <h1 class="font-unbounded text-3xl md:text-4xl font-black tracking-tight uppercase">
                    Vroomy<span class="text-lime-400">.be</span>
                </h1>
            </div>
            
            <p class="text-zinc-400 font-medium tracking-wide text-sm md:text-base mb-10 mt-2">
                The next generation car marketplace
            </p>

            <div class="w-full h-[1px] bg-zinc-800/60 my-8"></div>

            <div class="flex flex-col items-center gap-4">
                <span class="material-symbols-outlined text-5xl text-lime-400 animate-bounce">
                    construction
                </span>
                <h2 class="text-2xl font-bold">We are building something awesome.</h2>
                <p class="text-zinc-500 text-sm max-w-md">
                    Our platform is currently in closed development. We are working hard to bring you the best experience for buying and selling cars.
                </p>
            </div>

            <div class="mt-12 pt-8 border-t border-zinc-800/60 flex flex-col sm:flex-row justify-center items-center gap-4 text-sm">
                <span class="text-zinc-500">Are you an investor or partner?</span>
                <a href="mailto:semenperederii@gmail.com" class="bg-lime-400 text-black px-6 py-2 rounded-xl font-bold hover:bg-lime-300 transition-colors shadow-[0_0_15px_rgba(163,230,53,0.15)]">
                    Contact Us
                </a>
            </div>
        </div>
    </div>

</body>
</html>
